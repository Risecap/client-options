<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Deploy Options Page | Risecap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #1A0047;
    color: #FFFCF8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #FFFCF8;
    color: #1A0047;
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    margin-bottom: 0.4rem;
    margin-top: 1rem;
  }

  input, textarea {
    width: 100%;
    padding: 0.7rem 0.9rem;
    border: 2px solid #e0ddd8;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #1A0047;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #1A0047;
  }

  textarea {
    height: 180px;
    font-family: monospace;
    font-size: 0.8rem;
    resize: vertical;
  }

  .slug-preview {
    font-size: 0.75rem;
    color: #888;
    margin-top: 0.3rem;
  }

  .slug-preview span {
    color: #1A0047;
    font-weight: 600;
  }

  button {
    margin-top: 1.5rem;
    width: 100%;
    padding: 0.85rem;
    background: #1A0047;
    color: #FFFCF8;
    border: none;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: #2d0075; }
  button:disabled { background: #999; cursor: not-allowed; }

  .result {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    display: none;
  }

  .result.success {
    background: #e8f5e9;
    color: #2e7d32;
    display: block;
  }

  .result.success a {
    color: #1A0047;
    font-weight: 600;
  }

  .result.error {
    background: #fce4ec;
    color: #c62828;
    display: block;
  }

  .result.loading {
    background: #e8eaf6;
    color: #1A0047;
    display: block;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Deploy Client Options Page</h1>
  <p class="subtitle">Paste the HTML from Claude, click Deploy. Page goes live in about 30 seconds.</p>

  <label for="html">Paste the HTML</label>
  <textarea id="html" placeholder="Paste the full HTML here (from Claude's artifact output)"></textarea>

  <p class="slug-preview" id="preview-line" style="display:none">Will publish to: https://options.risecap.co.uk/<span id="slug-preview-text"></span>/</p>

  <button id="deploy-btn" onclick="deploy()">Deploy</button>

  <div id="result" class="result"></div>
</div>

<script>
  const htmlInput = document.getElementById('html');
  const previewLine = document.getElementById('preview-line');
  const previewSpan = document.getElementById('slug-preview-text');

  function extractFromHtml(html) {
    const titleMatch = html.match(/<title>[^|]*\|\s*([^|]+)\s*\|/);
    const company = titleMatch ? titleMatch[1].trim() : null;

    if (!company) return null;

    const now = new Date();
    const month = now.toLocaleString('en-GB', { month: 'short' }).toLowerCase();
    const year = now.getFullYear();
    const slug = company
      .toLowerCase()
      .replace(/\s+(ltd|limited|plc|llp|inc)\.?$/i, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      + '-' + month + '-' + year;

    return { company, slug };
  }

  htmlInput.addEventListener('input', () => {
    const parsed = extractFromHtml(htmlInput.value);
    if (parsed) {
      previewSpan.textContent = parsed.slug;
      previewLine.style.display = 'block';
    } else {
      previewLine.style.display = 'none';
    }
  });

  async function deploy() {
    const btn = document.getElementById('deploy-btn');
    const result = document.getElementById('result');
    const html = htmlInput.value.trim();

    if (!html) {
      result.className = 'result error';
      result.textContent = 'Paste the HTML first.';
      return;
    }

    if (!html.startsWith('<!DOCTYPE') && !html.startsWith('<html') && !html.startsWith('<head')) {
      result.className = 'result error';
      result.textContent = 'That doesn\'t look like HTML. Make sure you paste the full page source from Claude\'s artifact.';
      return;
    }

    const parsed = extractFromHtml(html);
    if (!parsed) {
      result.className = 'result error';
      result.textContent = 'Could not find the company name in the HTML. Expected a <title> like "Your Funding Options | Company Name | Risecap".';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Deploying...';
    result.className = 'result loading';
    result.textContent = 'Publishing ' + parsed.company + '...';

    try {
      const resp = await fetch('https://risecap.app.n8n.cloud/webhook/publish-options', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ html, slug: parsed.slug, company: parsed.company })
      });

      const data = await resp.json();

      if (data.success) {
        result.className = 'result success';
        result.innerHTML = 'Live in ~30 seconds: <a href="' + data.url + '" target="_blank">' + data.url + '</a><br><br>Copy the link and send it to the client.';
      } else {
        throw new Error(data.message || 'Deploy failed');
      }
    } catch (err) {
      result.className = 'result error';
      result.textContent = 'Deploy failed: ' + err.message;
    }

    btn.disabled = false;
    btn.textContent = 'Deploy';
  }
</script>
</body>
</html>
